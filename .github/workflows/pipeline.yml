# Phase 1+2: fetch bookmarks, extract structured claims with Claude, and append
# them to data/claims-history.jsonl (append-only). Raw tweet bodies are never
# written to disk or committed.
#
# Requires repo secrets: X_CLIENT_ID, X_USER_ID, X_REFRESH_TOKEN
# (optional X_CLIENT_SECRET, X_ACCESS_TOKEN), ANTHROPIC_API_KEY.
name: pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours

permissions:
  contents: write

concurrency:
  group: x-alpha-append
  cancel-in-progress: false

jobs:
  ingest-extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Ingest + extract claims (append-only)
        env:
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_USER_ID: ${{ secrets.X_USER_ID }}
          X_REFRESH_TOKEN: ${{ secrets.X_REFRESH_TOKEN }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_ALPHA_ANTHROPIC_MODEL: ${{ vars.X_ALPHA_ANTHROPIC_MODEL }}
        run: npm run pipeline
      - name: Commit appended claims
        run: |
          git config user.name "x-alpha-bot"
          git config user.email "bot@users.noreply.github.com"
          if ! git diff --quiet -- data/; then
            git add data/*.jsonl
            git commit -m "chore(pipeline): append new claims"
            git push
          else
            echo "no new claims"
          fi
