# Phase 1+2: fetch the configured X List's tweets, extract structured claims with
# Claude, and append them to data/claims-history.jsonl (append-only). Raw tweet
# bodies are never written to disk or committed.
#
# Ingestion uses OAuth 2.0 App-Only (Bearer): no user consent, no scopes, no
# refresh-token rotation. Requires repo secrets: X_BEARER_TOKEN, X_LIST_ID,
# ANTHROPIC_API_KEY.
name: pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # once a day

permissions:
  contents: write

# Bearer has no token race, but keep a lock so concurrent runs can't double-append
# to the JSONL.
concurrency:
  group: x-alpha-pipeline
  cancel-in-progress: false

jobs:
  ingest-extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Ingest list tweets + extract claims (append-only)
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_LIST_ID: ${{ secrets.X_LIST_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_ALPHA_ANTHROPIC_MODEL: ${{ vars.X_ALPHA_ANTHROPIC_MODEL }}
        run: npm run pipeline
      - name: Commit appended claims
        run: |
          git config user.name "x-alpha-bot"
          git config user.email "bot@users.noreply.github.com"
          if ! git diff --quiet -- data/; then
            git add data/*.jsonl
            git commit -m "chore(pipeline): append new claims"
            git push
          else
            echo "no new claims"
          fi
